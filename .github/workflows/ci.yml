name: CI Global

on:
  workflow_dispatch:

jobs:
  projeto-01:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r 01-normalizador-planilhas/requirements.txt
          pip install pytest ruff

      - name: Lint (ruff)
        working-directory: 01-normalizador-planilhas
        run: |
          ruff check .
          ruff format --check .

      - name: Run tests
        working-directory: 01-normalizador-planilhas
        run: pytest -q

  projeto-02:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: 02-conciliacao-bancaria

    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Generate sample files
        run: python src/main.py gerar-exemplo

      - name: Validate files
        run: python src/main.py validar

      - name: Run reconciliation
        run: python src/main.py conciliar