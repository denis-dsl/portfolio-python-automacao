name: Projeto 02 - Conciliacao Bancaria

on:
  push:
    branches:
      - main
    paths:
      - "02-conciliacao-bancaria/**"
      - ".github/workflows/projeto-02.yml"
  pull_request:
    branches: [main]
    paths:
      - "02-conciliacao-bancaria/**"
      - ".github/workflows/projeto-02.yml"

jobs:
  projeto-02:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: 02-conciliacao-bancaria

    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Generate sample files
        run: python src/main.py gerar-exemplo

      - name: Validate files
        run: python src/main.py validar

      - name: Run reconciliation
        run: python src/main.py conciliar

      - name: Check outputs
        run: |
          test -f output/conciliado.xlsx
          test -f logs/conciliacao.log

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: projeto-02-${{ matrix.python-version }}
          path: |
            02-conciliacao-bancaria/output/conciliado.xlsx
            02-conciliacao-bancaria/logs/conciliacao.log